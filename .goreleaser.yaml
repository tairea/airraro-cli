version: 2
project_name: airraro-pp-cli
changelog:
  disable: true
builds:
  - id: airraro-pp-cli
    main: ./cmd/airraro-pp-cli
    binary: airraro-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X airraro-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: airraro-pp-mcp
    main: ./cmd/airraro-pp-mcp
    binary: airraro-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: airraro-pp-cli
    repository:
      owner: tairea
      name: homebrew-tap
    homepage: "https://github.com/tairea/airraro-pp-cli"
    description: "Live Cook Islands flight fares and the full Air Rarotonga route network, agent-native with offline search."
    install: |
      bin.install "airraro-pp-cli"
      bin.install "airraro-pp-mcp"
